spring:
  application:
    name: demo   # 原来的项目名称
  datasource:
    url: jdbc:mysql://mysql:3306/mydatabase?useSSL=false&serverTimezone=UTC
    username: myuser
    password: secret
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

server:
  port: 8080   # 项目启动端口，可根据需要修改

jwt:
  secret: mysecretkey123456789012345678901234
  access-expire: 36000000   # 10小时（毫秒）
  refresh-expire: 604800    # 7天（秒）

vaadin:
  launch-browser: false
  frontend:
    url: http://localhost:5173
  productionMode: false
  dev-mode:
    enabled: true

app:
  api:
    base-url: http://localhost:8080



