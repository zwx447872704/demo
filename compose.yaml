version: "3.8"

services:
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
  mysql:
    image: 'mysql:8.0'
    container_name: mysql
    environment:
      MYSQL_DATABASE: mydatabase
      MYSQL_USER: myuser
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: verysecret
    ports:
      - '3306:3306'   # 映射到宿主机的 3306
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always

volumes:
  mysql_data: